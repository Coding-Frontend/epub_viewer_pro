name: epub_viewer_pro
description: |
  A full-featured Flutter EPUB viewer with chapter navigation, bookmarks, highlights,
  notes, dark/light/sepia themes, 25+ language fonts, DRM protection, and optional
  server-sync callbacks. Built on epubx and flutter_widget_from_html.
version: 0.0.1
homepage: https://codingfrontend.in
repository: https://github.com/Coding-Frontend/epub_viewer_pro
issue_tracker: https://github.com/Coding-Frontend/epub_viewer_pro/issues

topics:
  - epub
  - viewer
  - drm
  - annotations
  - flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  epubx: ^4.0.0
  flutter_widget_from_html: ^0.15.2
  screen_protector: ^1.4.10
  path_provider: ^2.1.5
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
